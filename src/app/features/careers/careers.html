<section class="py-5 bg-light">
  <div class="container">
    <h2 class="mb-3">Careers</h2>
    <p>
      We are always looking for talented engineers, architects, and product
      specialists to join our distributed team.
    </p>

    <div class="row mt-4 g-3">
      <div class="col-md-4" *ngFor="let role of roles">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">{{ role.title }}</h5>
            <p class="card-text small text-muted">{{ role.location }}</p>
            <p class="card-text">{{ role.summary }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
