<header class="site-header">
  <div class="container header-row">
    <a class="brand-block" routerLink="/" (click)="closeMenu()">
      <img src="assets/srisimha-logo.png" alt="Srisimha Tech logo" class="brand-logo" />
      <span class="brand-copy">
        <strong>SRISIMHA TECH</strong>
        <small>Consultancy LLC</small>
      </span>
    </a>

    <button
      type="button"
      class="menu-toggle"
      [class.is-open]="menuOpen"
      (click)="toggleMenu()"
      aria-label="Toggle navigation"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" [class.is-open]="menuOpen">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: isExact(link.path) }"
          (click)="closeMenu()"
        >
          {{ link.label }}
        </a>
      }

      <a
        class="btn btn-gold nav-cta"
        routerLink="/contact"
        fragment="inquiry-form"
        (click)="closeMenu()"
      >
        Talk to Us
      </a>
    </nav>
  </div>
</header>
